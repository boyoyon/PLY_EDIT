        <h1><center>迷路のような多孔質構造 (gyroid ジャイロイド)</center></h1>

<center><img src="images/gyroid.gif"></center><br>

<h3>作り方</h3>
<p>
python src\implicit_function.py np.sin(4*x)*np.cos(4*y)+np.sin(4*y)*np.cos(4*z)+np.sin(4*z)*np.cos(4*x)<br>
・矢印キーで level を上げ下げする。<br>
　f(x,y,z) = level で 3D 形状が決まる。<br>
　値が大きすぎても、小さすぎてもエラー終了する(^^;)ので、その場合はやり直す･･･<br>
・sキー押下で、implicit_function.ply に保存され、終了する。
</p>
