    <body>
        <h1><center>竹細工っぽいもの</center></h1>

<p>
[1] 円環 (正100角形) を作る。<br>
　　polygon　100　1　-0.01　# 正 100 角形,　外接円半径 1,　厚さ 0.01　(マイナスは側面のみの指定)
</p>
<center><img src="images/BambooCraftStyle001.png"></center>

<p>
[2] 円環を回転する。<br>
　　r　90　0　0　# x 軸に沿って 90°回転<br>
　　※ 回転角度は, 座標軸ラベルから原点の方向から見て左回りが正。
</p>
<center><img src="images/BambooCraftStyle002.png"></center>
<p>
　　r　0　-30　0　# y 軸に沿って -30°回転
</p>
<center><img src="images/BambooCraftStyle003.png"></center>

<p>
[3] 円環を移動する。<br>
　　t　0　0　1　# z 軸方向に 1 移動する
</p>
<center><img src="images/BambooCraftStyle004.png"></center>

<p>
[4] 円環を複数回回転する。<br>
　　r　0　10　0　36　# y 軸周りに 10°回転を 36 回繰り返す
</p>
<center><img src="images/BambooCraftStyle005.png"></center>
    </body>
